name: Build Android

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (e.g. v0.1.0). Leave empty to skip release creation."
        required: false
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK / AAB
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: gradle/actions/setup-gradle@v3

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        working-directory: apps/android
        run: chmod +x ./gradlew

      - name: Run unit tests
        working-directory: apps/android
        run: ./gradlew test --no-daemon

      - name: Build debug APK
        if: github.event_name == 'pull_request'
        working-directory: apps/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Build release AAB
        if: github.event_name != 'pull_request'
        working-directory: apps/android
        run: ./gradlew bundleRelease --no-daemon

      - name: Build release APK
        if: github.event_name != 'pull_request'
        working-directory: apps/android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload debug APK
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: maximeze-android-debug
          path: apps/android/app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: maximeze-android-release-apk
          path: apps/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: ignore

      - name: Upload release AAB
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: maximeze-android-release-aab
          path: apps/android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: ignore

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag || github.ref_name }}
          files: |
            apps/android/app/build/outputs/apk/release/*.apk
            apps/android/app/build/outputs/bundle/release/*.aab
          generate_release_notes: true
