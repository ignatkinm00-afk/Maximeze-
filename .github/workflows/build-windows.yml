name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Tauri (Windows)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/windows/src-tauri

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: |
          pnpm --filter @maximeze/core-engine build
          pnpm --filter @maximeze/design-system build

      - name: Build Tauri app (debug)
        if: github.event_name == 'pull_request'
        working-directory: apps/windows
        run: pnpm tauri build --debug

      - name: Build Tauri app (release)
        if: github.event_name != 'pull_request'
        working-directory: apps/windows
        run: pnpm tauri build

      - name: Upload Windows installer (NSIS)
        uses: actions/upload-artifact@v4
        with:
          name: maximeze-windows-nsis
          path: apps/windows/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: ignore

      - name: Upload Windows MSIX
        uses: actions/upload-artifact@v4
        with:
          name: maximeze-windows-msix
          path: apps/windows/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: ignore

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/windows/src-tauri/target/release/bundle/nsis/*.exe
            apps/windows/src-tauri/target/release/bundle/msi/*.msi
          generate_release_notes: true
